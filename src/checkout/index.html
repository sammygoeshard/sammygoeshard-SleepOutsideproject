<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/checkout.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="products checkout">
        <h2>Review and Place Your Order</h2>

        <form id="checkoutForm" class="checkout-form">
          <fieldset>
            <legend>Customer Name</legend>

            <label for="fname">First Name</label>
            <input id="fname" name="fname" type="text" required minlength="2" />

            <label for="lname">Last Name</label>
            <input id="lname" name="lname" type="text" required minlength="2" />
          </fieldset>

          <fieldset>
            <legend>Address</legend>

            <label for="street">Street Address</label>
            <input id="street" name="street" type="text" required minlength="3" />

            <label for="city">City</label>
            <input id="city" name="city" type="text" required />

            <label for="state">State</label>
            <input id="state" name="state" type="text" required minlength="2" maxlength="2" />

            <label for="zip">Zip</label>
            <input
              id="zip"
              name="zip"
              type="text"
              required
              pattern="\d{5}(-\d{4})?"
              title="Use 5 digits or ZIP+4 format."
            />
          </fieldset>

          <fieldset>
            <legend>Payment</legend>

            <label for="cardNumber">Credit Card Number</label>
            <input
              id="cardNumber"
              name="cardNumber"
              type="text"
              required
              pattern="\d{13,19}"
              title="Use 13-19 digits with no spaces."
            />

            <label for="expiration">Expiration Date</label>
            <input
              id="expiration"
              name="expiration"
              type="text"
              required
              pattern="(0[1-9]|1[0-2])\/\d{2,4}"
              title="Use MM/YY or MM/YYYY format."
            />

            <label for="code">Security Code</label>
            <input
              id="code"
              name="code"
              type="text"
              required
              pattern="\d{3,4}"
              title="Use 3 or 4 digits."
            />
          </fieldset>

          <div class="checkout-summary">
            <h3>Order Summary</h3>
            <p>Subtotal: <span id="order-subtotal">$0.00</span></p>
            <p>Shipping: <span id="order-shipping">$0.00</span></p>
            <p>Tax: <span id="order-tax">$0.00</span></p>
            <p class="checkout-total">Order Total: <span id="order-total">$0.00</span></p>
          </div>

          <button id="checkoutSubmit" type="submit">Checkout</button>
        </form>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
