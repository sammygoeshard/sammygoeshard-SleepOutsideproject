<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Products</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/product-listing.js" type="module"></script>
  </head>

  <body>
    <header id="main-header" class="divider"></header>

    <main class="divider">
      <section class="products">
        <h2 class="title">Top Products</h2>
        <div class="product-filters">
          <label for="product-search">Search</label>
          <input id="product-search" type="search" placeholder="Search by product name" aria-label="Search products by name" />

          <label for="product-min-price">Min price</label>
          <input id="product-min-price" type="number" min="0" step="0.01" placeholder="0.00" aria-label="Minimum product price" />

          <label for="product-max-price">Max price</label>
          <input id="product-max-price" type="number" min="0" step="0.01" placeholder="999.99" aria-label="Maximum product price" />

          <button id="clear-filters" type="button">Clear filters</button>
        </div>

        <ul class="product-list"></ul>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
